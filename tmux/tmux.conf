set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on
set -sg escape-time 0

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Shift + Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
# Themes
# set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
# set -g @plugin 'maxpetretta/tmux-monokai-pro'
set -g @plugin 'uhs-robert/tmux-oasis'
set -g @oasis_flavor "lagoon_dark"  # Optional: defaults to lagoon_dark

# Keep tmux-oasis on its lagoon_dark palette, but hand the background back to the
# terminal so Ghostty's transparency/blur can show through. The sampled #0a1e24
# is useful as a visual reference, but tmux needs `default` here for true transparency.
set -g @thm_strong_primary "#1ca0fd"
set -g @thm_primary "#58b8fd"
set -g @thm_light_primary "#94d0fe"
set -g @thm_secondary "#f8b471"
set -g @thm_prefix "#ffa0a0"
set -g @thm_fg "#d9e6fa"
set -g @thm_core "#101825"
set -g @thm_mantle "default"
set -g @thm_surface "#22385c"
set -g @thm_visual "#5a3824"
set -g @thm_red "#ff7979"
set -g @thm_orange "#f8b471"
set -g @thm_yellow "#f0e68c"
set -g @thm_green "#53d390"
set -g @thm_teal "#8fd1c7"
set -g @thm_blue "#71b8ff"
set -g @thm_indigo "#c28eff"

# Set vi-mode
set-window-option -g mode-keys vi

# Keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Auto-name new windows with random sci-fi corporation names
bind c new-window \; run-shell "tmux rename-window \"$(~/.config/tmux/random-corp-name.sh)\""

# Auto-name first window on tmux startup
set-hook -g after-new-session 'run-shell "tmux rename-window \"$(~/.config/tmux/random-corp-name.sh)\""'

# Disable automatic window renaming so names persist
set-option -g allow-rename off

run '~/.tmux/plugins/tpm/tpm'

# Re-assert transparent backgrounds after the theme plugin loads.
set -g status-style "bg=default"
set -gF message-style "fg=#{@thm_primary},bg=default,align=centre"
set -gF message-command-style "fg=#{@thm_secondary},bg=default,align=centre"
setw -g window-style "bg=default"
setw -g window-active-style "bg=default"
setw -g pane-border-style "bg=default,fg=#{@thm_surface}"
setw -g pane-active-border-style "bg=default,fg=#{@thm_primary}"
